# ─────────────────────────────────────────────────────────
#  TaskBuddy API — Application Configuration
# ─────────────────────────────────────────────────────────

# Application name (shown in logs and actuator)
spring.application.name=taskbuddy-api

# Server port (default 8080)
server.port=3001

# ── MongoDB ──────────────────────────────────────────────
# Local MongoDB  →  mongodb://localhost:27017/task-buddy
# MongoDB Atlas  →  replace with your Atlas connection string
spring.data.mongodb.uri=mongodb://localhost:27017/task-buddy

# ── Logging ──────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

logging.level.org.springframework.data.mongodb=DEBUG
